<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }
        #myFrame { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <iframe id="myFrame" name="myFrame" src="https://kmkm.rrgnf.cn/ceshi.html" style="width:100%; height:100%; border:none;"></iframe>

    <script>
        const params = new URLSearchParams(window.location.search);
        // 如果检测到 ?target=pay，自动切换到你的支付页
        if (params.get('target') === 'pay') {
            document.getElementById('myFrame').src = 'http://sskm.gouche.pub/pay/assign.php';
        }
    </script>
</body>
</html>
