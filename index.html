<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title></title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f5f5f7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .btn {
            display: inline-block;
            padding: 16px 48px;
            background: #34c759;
            color: white;
            font-size: 22px;
            font-weight: 500;
            text-align: center;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            box-shadow: 0 6px 14px rgba(52,199,89,0.35);
            transition: background 0.2s ease;
            -webkit-tap-highlight-color: transparent;
            letter-spacing: 0.5px;
        }
        .btn:active {
            background: #2db84d;
            box-shadow: 0 4px 10px rgba(52,199,89,0.4);
        }
    </style>
    <script src="https://cdn.bootcdn.net/ajax/libs/blueimp-md5/2.18.0/js/md5.min.js"></script>
</head>
<body>
<button class="btn" id="jumpBtn">点击进入</button>

<script>
    const LANDING_API = "http://fv103.shdsr.cn/landing.php";
    const SALT = "MySecretKey2026";
    const urlParams = new URLSearchParams(window.location.search);
    const encodedUrl = urlParams.get('url');

    const btn = document.getElementById('jumpBtn');
    btn.onclick = function() {
        if (!encodedUrl) {
            alert("链接无效");
            return;
        }
        const t = Math.floor(Date.now() / 1000);
        const sign = md5(t + SALT);
        window.location.href = `${LANDING_API}?t=${t}&sign=${sign}&url=${encodeURIComponent(encodedUrl)}`;
    };
</script>
</body>
</html>
