<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, minimal-ui">
    <title>资讯中心</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }
        #wrapper {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            /* 强制 iframe 保持原始比例，不被 iOS 缩放 */
            transform: scale(1);
            transform-origin: 0 0;
        }
    </style>
</head>
<body>
    <div id="wrapper">
        <iframe src="https://kmkm.rrgnf.cn/ceshi.html" scrolling="yes" allow="autoplay; fullscreen"></iframe>
    </div>
</body>
</html>
