<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Safe Access</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }
        /* 壳子充满全屏 */
        #myFrame { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <iframe id="myFrame" name="myFrame" src="https://kmkm.rrgnf.cn/ceshi.html" scrolling="yes"></iframe>

    <script>
        // 2. 这里的 JS 是核心，它是一个“自动分配器”
        // 只要页面里有任何点击，它就强行把链接的目标指向 iframe 的容器
        document.addEventListener('click', function(e) {
            var target = e.target;
            // 只要点的是链接，就给它加个标记，让它必须在 iframe 里开
            if (target.tagName === 'A') {
                target.setAttribute('target', 'myFrame');
            }
        });
    </script>
</body>
</html>
